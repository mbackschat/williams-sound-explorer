name: Deploy explorer to GitHub Pages

# Builds the ROM-free explorer and publishes it to GitHub Pages on every push
# to main.  The private `research/` submodule is NOT checked out (not needed —
# the build ships no ROM bytes; users upload their own at runtime).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: explorer
    steps:
      - uses: actions/checkout@v4
        # submodules default to false — the private research/ submodule is
        # inaccessible and unnecessary for the build.
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: explorer/package-lock.json
      - run: npm ci
      - name: Build (subpath base for project Pages)
        run: npm run build
        env:
          VITE_BASE: /williams-sound-explorer/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: explorer/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
